name: Auto Spoof And Release

on:
  workflow_dispatch:
    inputs:
      force:
        description: "Force spoof and release even if src/package.json already matches latest YM version"
        required: false
        default: false
        type: boolean
      version:
        description: "Optional YM version override (for example 5.94.0)"
        required: false
        type: string
      minify:
        description: "Build minified app.asar"
        required: false
        default: false
        type: boolean
      modernize:
        description: "Run modernize before build"
        required: false
        default: false
        type: boolean
      only_upload_app_asar:
        description: "Upload app.asar to backend only, skip GitHub Release and Discord patch notes"
        required: false
        default: false
        type: boolean
      only_send_patch_notes:
        description: "Send Discord patch notes only, skip GitHub Release and backend upload"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "*/30 * * * *"

concurrency:
  group: auto-spoof-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  spoof-and-release:
    if: github.ref_name == 'main' || github.ref_name == 'dev'
    runs-on: ubuntu-latest

    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      SERVER_URL: ${{ secrets.SERVER_URL }}
      AUTH_TOKEN: ${{ secrets.AUTH_TOKEN }}
      GITHUB_REPO_OWNER: ${{ secrets.GITHUB_REPO_OWNER }}
      GITHUB_REPO_NAME: ${{ secrets.GITHUB_REPO_NAME }}
      GITHUB_RELEASE_TAG_PREFIX: ${{ secrets.GITHUB_RELEASE_TAG_PREFIX }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Yarn
        run: npm install --global yarn@1.22.22

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y p7zip-full

      - name: Install repository dependencies
        run: yarn install --ignore-engines

      - name: Auto spoof and publish release
        run: |
          set -euo pipefail

          ARGS=("--noNativeModules")

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.force }}" = "true" ]; then
              ARGS+=("--force")
            fi

            if [ -n "${{ inputs.version }}" ]; then
              ARGS+=("--version=${{ inputs.version }}")
            fi

            if [ "${{ inputs.minify }}" = "true" ]; then
              ARGS+=("--minify")
            fi

            if [ "${{ inputs.modernize }}" = "true" ]; then
              ARGS+=("--modernize")
            fi

            if [ "${{ inputs.only_upload_app_asar }}" = "true" ]; then
              ARGS+=("--onlyUploadAppAsar")
            fi

            if [ "${{ inputs.only_send_patch_notes }}" = "true" ]; then
              ARGS+=("--onlySendPatchNotes")
            fi
          fi

          node toolset/scripts/autoSpoofRelease.js "${ARGS[@]}"
